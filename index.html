<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLR Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: system-ui, sans-serif;
            padding: 20px;
        }
        .image-container {
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #card {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img id="card" alt="Card">
    </div>
    <button id="newCard">New Card</button>
    <script src="index.js"></script>
</body>
</html>
