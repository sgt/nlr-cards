<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLR Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: system-ui, sans-serif;
            padding: 20px;
        }

        .image-container {
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #card {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background: #555;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        #favLink {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 14px;
            color: #333;
            display: none;
            cursor: pointer;
        }

        #favLink:hover {
            text-decoration: underline;
        }

        #favOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #favModal {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 80%;
            max-height: 80%;
            overflow-y: auto;
            position: relative;
        }

        #favClose {
            position: absolute;
            margin: 0;
            top: 5px;
            right: 5px;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            color: #333;
            padding: 0px 10px;
        }

        #favClose:hover {
            color: #000;
        }

        #favGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .favCard {
            position: relative;
            cursor: pointer;
        }

        .favCard img {
            width: 100%;
            height: auto;
            display: block;
        }

        .favRemove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #333;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 5px;
            border-radius: 50%;
            color: #fff;
            line-height: 1;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="favLink">Favourites: <span id="favCount">0</span></div>
    <div id="favOverlay">
        <div id="favModal">
            <button id="favClose">×</button>
            <h2>Favourites</h2>
            <div id="favGrid"></div>
        </div>
    </div>
    <div class="image-container">
        <img id="card" alt="Card">
    </div>
    <div class="buttons">
        <button id="newCard">🔃 New Card</button>
        <button id="favourite">🤍</button>
    </div>
    <script src="index.js"></script>
</body>

</html>
